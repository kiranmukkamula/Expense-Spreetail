databases:
  - name: split-expenser-db
    databaseName: split_expenser
    user: split_user
    plan: free

services:
  - type: web
    name: split-expenser-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: split-expenser-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://frontend-two-sooty-11.vercel.app
      - key: PYTHON_VERSION
        value: "3.11.0"
